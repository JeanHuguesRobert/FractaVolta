<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360">

  <!-- Background -->
  <rect width="1200" height="360" fill="#FFFFFF"/>

  <!-- Logo (scaled down) -->
  <g transform="translate(40,40) scale(0.3)">
    <defs>
      <clipPath id="cNW"><rect x="0" y="0" width="376" height="376"/></clipPath>
      <clipPath id="cNE"><rect x="424" y="0" width="376" height="376"/></clipPath>
      <clipPath id="cSW"><rect x="0" y="424" width="376" height="376"/></clipPath>
      <clipPath id="cSE"><rect x="424" y="424" width="376" height="376"/></clipPath>
      <clipPath id="cD"><circle cx="400" cy="400" r="400"/></clipPath>
    </defs>

    <g clip-path="url(#cD)">
      <circle cx="400" cy="400" r="400" fill="#D7141A" clip-path="url(#cNW)"/>
      <circle cx="400" cy="400" r="400" fill="#F0C30F" clip-path="url(#cNE)"/>
      <circle cx="400" cy="400" r="400" fill="#0046AD" clip-path="url(#cSW)"/>
      <circle cx="400" cy="400" r="400" fill="#FFFFFF" clip-path="url(#cSE)"/>

      <rect x="376" y="0" width="48" height="800" fill="#1A1A1A"/>
      <rect x="0" y="376" width="800" height="48" fill="#1A1A1A"/>
    </g>

    <circle cx="400" cy="400" r="376" fill="none" stroke="#1A1A1A" stroke-width="48"/>
  </g>

  <!-- Title -->
  <text x="320" y="150"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64"
        fill="#111111"
        font-weight="600">
    FractaVolta
  </text>

  <!-- Tagline -->
  <text x="320" y="210"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        fill="#444444">
    From photons to inferences
  </text>

  <!-- Subtitle -->
  <text x="320" y="260"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22"
        fill="#666666">
    Energy Packet Networks
  </text>

</svg>
