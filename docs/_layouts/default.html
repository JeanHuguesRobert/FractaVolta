<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} feed" href="{{ '/feed.xml' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/jana.svg' | relative_url }}">
    {% if page.alternate_url %}
      {% assign alternate_lang = 'fr' %}
      {% if page.lang == 'fr' %}
        {% assign alternate_lang = 'en' %}
      {% endif %}
      <link rel="alternate" hreflang="{{ alternate_lang }}" href="{{ page.alternate_url | absolute_url }}">
    {% endif %}
    <link rel="alternate" hreflang="x-default" href="{{ '/' | absolute_url }}">
  </head>
  <body>
    {% include header.html %}

    <main class="site-main">
      {{ content }}
    </main>

    {% include footer.html %}
    {% include guide-widget.html %}
    <script src="{{ '/assets/guide.js' | relative_url }}" defer></script>
  </body>
</html>
