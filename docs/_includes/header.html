<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <img class="site-header__logo" src="{{ '/assets/jana.svg' | relative_url }}" alt="FractaVolta" />
      <span class="site-header__name">FractaVolta</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <ul class="site-nav__list">
        {% for item in site.data.navigation.main %}
          {% assign current = false %}
          {% if page.url == item.url or page.url == item.url | append: '/' %}
            {% assign current = true %}
          {% endif %}
          <li class="site-nav__item">
            <a class="site-nav__link {% if current %}is-current{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
